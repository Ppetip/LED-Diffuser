name: Hardware profile CI
on:
  push:
    branches: [codex/consumer-panel]
  pull_request:
jobs:
  hardware-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check docs/app-profile.js
      - run: node verify/test_hardware_profiles.js
